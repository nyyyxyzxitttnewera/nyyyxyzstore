<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}
.nav {
  background:#020617;
  padding:15px;
  display:flex;
  justify-content:space-between;
}
.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}
.card {
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,255,255,0.2);
}
button {
  padding:8px 12px;
  background:red;
  border:none;
  color:white;
  border-radius:5px;
}
</style>
</head>
<body>

<div class="nav">
  <div>🔥 NYYYXYZ PANEL</div>
  <button onclick="logout()">Logout</button>
</div>

<div class="cards">
  <div class="card">
    <h3>User</h3>
    <p id="user"></p>
  </div>
  <div class="card">
    <h3>Status</h3>
    <p>Active</p>
  </div>
  <div class="card">
    <h3>Saldo</h3>
    <p>Rp 0</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "ISI PUNYA LU",
  authDomain: "ISI PUNYA LU",
  projectId: "ISI PUNYA LU",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("user").innerText = user.email;
  } else {
    location.href = "login.html";
  }
});

window.logout = () => {
  signOut(auth);
  location.href = "login.html";
};
</script>

</body>
</html>
