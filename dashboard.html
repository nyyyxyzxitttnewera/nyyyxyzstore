<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* NAVBAR */
.nav {
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 0 15px rgba(0,255,255,0.2);
}

.logo {
  font-weight:bold;
  font-size:18px;
  color:#00eaff;
}

/* GREETING */
.greet {
  padding:10px 25px;
  color:#94a3b8;
}

/* GRID */
.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:25px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  padding:20px;
  backdrop-filter:blur(10px);
  transition:0.3s;
  box-shadow:0 0 10px rgba(0,255,255,0.15);
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 0 25px rgba(0,255,255,0.4);
}

.card h3 {
  margin:0 0 10px;
  color:#00eaff;
}

/* BUTTON */
button {
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:#ff3b3b;
  color:white;
  cursor:pointer;
}

button:hover {
  background:#ff0000;
}
</style>

</head>

<body>

<div class="nav">
  <div class="logo">🔥 NYYYXYZ PANEL</div>
  <button onclick="logout()">Logout</button>
</div>

<div class="greet" id="greet">Loading...</div>

<div class="cards">
  <div class="card">
    <h3>👤 User</h3>
    <p id="user">-</p>
  </div>

  <div class="card">
    <h3>⚡ Status</h3>
    <p>Active</p>
  </div>

  <div class="card">
    <h3>💰 Saldo</h3>
    <p>Rp 0</p>
  </div>

  <div class="card">
    <h3>📦 Order</h3>
    <p>Belum ada</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG LU (UDAH GW ISI) */
const firebaseConfig = {
  apiKey: "AIzaSyBhSu9CnvQ-wLG-oHh8ad4DfIVZ3mb54ic",
  authDomain: "nyyyxyz.firebaseapp.com",
  projectId: "nyyyxyz"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* CEK LOGIN */
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById("user").innerText = user.email;

    // greeting otomatis
    const jam = new Date().getHours();
    let teks = "Selamat datang";

    if (jam < 12) teks = "Selamat pagi ☀️";
    else if (jam < 18) teks = "Selamat sore 🌤️";
    else teks = "Selamat malam 🌙";

    document.getElementById("greet").innerText = teks + ", " + user.email;

  } else {
    // kalau belum login → balik ke login
    window.location.href = "login.html";
  }
});

/* LOGOUT */
window.logout = () => {
  signOut(auth);
  window.location.href = "login.html";
};
</script>

</body>
</html>
